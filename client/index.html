<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalShare | Easy P2P File Sharing</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-glass"></div>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M12 16V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M8 12L12 8L16 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <span>LocalShare</span>
        </div>
        <div class="network-info">
            <span id="network-url">Connecting...</span>
        </div>
    </header>

    <main class="container">
        <!-- Sidebar: QR Code & Connection Info -->
        <aside class="sidebar glass-card">
            <h3>Connect Phone</h3>
            <p>Scan to open on mobile immediately.</p>
            <div class="qr-container">
                <img id="qr-code" src="" alt="Scan QR Code to connect" />
            </div>

            <div class="status-indicator">
                <div class="indicator online"></div>
                <span id="socket-status">Connecting to network...</span>
            </div>

            <div class="devices-section">
                <h3>Available Devices</h3>
                <ul id="device-list">
                    <li class="empty-state">No other devices found on this network.</li>
                </ul>
            </div>

            <div class="online-share-section" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--card-border);">
                <h3>Online Share (Public)</h3>
                <p>Transfer files across any network.</p>
                <div class="code-input-group" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <input type="text" id="share-code-input" placeholder="Enter Share Code" 
                        style="flex: 1; padding: 0.5rem; border-radius: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); color: white; outline: none;">
                    <button class="btn-primary" onclick="receiveByCode()" style="padding: 0.5rem 1rem;">Join</button>
                </div>
                <button class="btn-secondary" onclick="generateShareCode()" style="width: 100%; margin-top: 0.5rem; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--card-border); padding: 0.75rem; border-radius: 0.5rem; cursor: pointer;">Generate Share Link</button>
            </div>
        </aside>

        <!-- Main Workspace: Upload & Transfer UI -->
        <section class="workspace glass-card">
            <div class="upload-zone" id="drop-zone">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h2>Drag & Drop files here</h2>
                <p>or click to browse your computer</p>
                <input type="file" id="file-input" multiple hidden>
                <button class="btn-primary" onclick="document.getElementById('file-input').click()">Browse
                    Files</button>

                <div class="secure-transfer" style="margin-top: 1.5rem; width: 100%; max-width: 300px;">
                    <label for="transfer-password"
                        style="display:block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">🔒
                        Secure Transfer (Optional):</label>
                    <input type="password" id="transfer-password" placeholder="Set a password to lock..."
                        style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); color: white; outline: none; box-sizing: border-box;">
                </div>
            </div>

            <!-- Transfer Progress Section -->
            <div class="transfer-list" id="transfer-list">
                <!-- Transfer items inject here -->
            </div>
        </section>
    </main>

    <!-- Templates for UI -->
    <template id="transfer-item-template">
        <div class="transfer-item glass-morphism">
            <div class="file-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                    <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
            </div>
            <div class="transfer-details">
                <div class="file-info">
                    <span class="file-name">filename.ext</span>
                    <span class="file-size">0 KB</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <div class="transfer-status">Waiting...</div>
            </div>
            <div class="transfer-actions">
                <!-- Download button injects here -->
            </div>
        </div>
    </template>

    <!-- Socket.IO Client Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="webrtc.js"></script>
    <script src="app.js"></script>
</body>

</html>
